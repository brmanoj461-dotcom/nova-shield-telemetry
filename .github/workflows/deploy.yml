name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1                  
  ECS_SERVICE: nova-shield-service       
  ECS_CLUSTER: nova-shield-telemetry-cluster       
  SERVER_ECR_REPO: nova-shield-telemetry        
  SIMULATOR_ECR_REPO: nova-shield-simulator    

jobs:
  deploy:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Server Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/$SERVER_ECR_REPO:latest -f backend/Dockerfile backend/
        docker push $ECR_REGISTRY/$SERVER_ECR_REPO:latest

    - name: Build and Push Simulator Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t $ECR_REGISTRY/$SIMULATOR_ECR_REPO:latest -f backend/Dockerfile.simulator backend/
        docker push $ECR_REGISTRY/$SIMULATOR_ECR_REPO:latest

    - name: Force ECS Redeployment
      run: |
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment